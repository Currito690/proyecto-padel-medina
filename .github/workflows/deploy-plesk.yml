name: Build & deploy to Plesk

# Compila el frontend en GitHub (donde Node sí funciona) y publica SOLO el
# resultado (dist/) en la rama `plesk-deploy`. Plesk descarga esa rama tal cual
# (sin compilar nada en el servidor). Flujo: push a main -> build -> Plesk pull.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      # Publica el contenido de dist/ (incluido .htaccess) en la rama plesk-deploy
      - name: Publicar a la rama plesk-deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: plesk-deploy
          commit_message: "deploy: build de ${{ github.sha }}"
